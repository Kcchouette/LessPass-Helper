<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LessPass Helper</title>
  </head>
  <body>
    <header>
      <h1>LessPass Helper</h1>
      <p>Générateur de mots de passe hors ligne</p>
    </header>

    <main x-data>
      <!-- Message d'erreur -->
      <template x-if="$store.app.error">
        <dialog open>
          <article>
            <p x-text="$store.app.error"></p>
            <footer>
              <button @click="$store.app.error = ''">Fermer</button>
            </footer>
          </article>
        </dialog>
      </template>

      <!-- Recherche -->
      <section x-show="$store.app.profiles.length">
        <input
          type="search"
          placeholder="Rechercher un site ou login..."
          x-model="$store.app.query"
        />
      </section>

      <!-- Générateur -->
      <section>
        <h2>Générer un mot de passe</h2>
        <form @submit.prevent="$store.app.generatePassword()">
          <input
            type="password"
            placeholder="Mot de passe maître"
            x-model="$store.app.masterPassword"
          />
          <input
            type="text"
            placeholder="Site (ex: github.com)"
            x-model="$store.app.genSite"
          />
          <input
            type="text"
            placeholder="Login (ex: user@email.com)"
            x-model="$store.app.genLogin"
          />
          <div>
            <label>
              <input type="checkbox" x-model="$store.app.genLowercase" checked />
              a-z
            </label>
            <label>
              <input type="checkbox" x-model="$store.app.genUppercase" checked />
              A-Z
            </label>
            <label>
              <input type="checkbox" x-model="$store.app.genDigits" checked />
              0-9
            </label>
            <label>
              <input type="checkbox" x-model="$store.app.genSymbols" checked />
              %!@
            </label>
          </div>
          <div class="grid">
            <label>
              Longueur
              <input type="number" min="5" max="35" x-model.number="$store.app.genLength" />
            </label>
            <label>
              Compteur
              <input type="number" min="1" x-model.number="$store.app.genCounter" />
            </label>
          </div>
          <button type="submit">Générer</button>
        </form>
        <template x-if="$store.app.generatedPassword">
          <div>
            <output
              x-text="$store.app.generatedPassword"
              @click="navigator.clipboard.writeText($el.textContent)"
              style="cursor: pointer;"
              title="Cliquer pour copier"
            ></output>
            <small>Cliquez sur le mot de passe pour le copier</small>
          </div>
        </template>
      </section>

      <!-- Profils -->
      <section x-show="$store.app.filteredProfiles.length">
        <h2>
          Profils
          <small x-show="$store.app.query" x-text="`(${$store.app.filteredProfiles.length} résultat·s)`"></small>
        </h2>
        <div class="grid">
          <template x-for="profile in $store.app.filteredProfiles" :key="profile.id">
            <article>
              <header>
                <strong x-text="profile.site"></strong>
              </header>
              <p>Login : <strong x-text="profile.login"></strong></p>
              <p>
                <small>
                  <span x-show="profile.lowercase">a-z </span>
                  <span x-show="profile.uppercase">A-Z </span>
                  <span x-show="profile.digits">0-9 </span>
                  <span x-show="profile.symbols">%!@ </span>
                  · <span x-text="profile.length"></span> caractères
                  · compteur <span x-text="profile.counter"></span>
                </small>
              </p>
              <footer>
                <button @click="$store.app.fillGenerator(profile)">Générer</button>
                <button class="secondary" @click="$store.app.removeProfile(profile.id)">Supprimer</button>
              </footer>
            </article>
          </template>
        </div>
      </section>

      <!-- Import / Export -->
      <section>
        <h2>Import / Export</h2>
        <textarea
          rows="5"
          x-model="$store.app.importText"
          placeholder="Collez votre JSON LessPass ici..."
        ></textarea>
        <div class="grid">
          <button @click="$store.app.importJson()">Importer</button>
          <button class="secondary" @click="$store.app.exportJson()">Exporter</button>
        </div>
        <template x-if="$store.app.exportedJson">
          <div>
            <textarea rows="5" x-text="$store.app.exportedJson" readonly></textarea>
            <button @click="navigator.clipboard.writeText($store.app.exportedJson)">Copier le JSON</button>
          </div>
        </template>
      </section>
    </main>

    <footer>
      <p>
        <small>
          LessPass Helper · GPL v3 ·
          <a href="https://github.com/Kcchouette/LessPass-Helper" target="_blank">GitHub</a>
        </small>
      </p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
